services:
  postgres:
    image: postgres:16
    container_name: tofu-ray-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: tofu_ray
      POSTGRES_USER: tofu
      POSTGRES_PASSWORD: tofu_dev_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tofu -d tofu_ray"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7
    container_name: tofu-ray-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  redis_data:
